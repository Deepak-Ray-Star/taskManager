version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: team-task-manager-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: team-task-manager-backend
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://root:password@mongodb:27017/team-task-manager?authSource=admin
      JWT_SECRET: your_jwt_secret_key_here
      JWT_EXPIRE: 7d
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - app-network
    volumes:
      - ./backend/src:/app/src

  frontend:
    build: ./frontend
    container_name: team-task-manager-frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge
